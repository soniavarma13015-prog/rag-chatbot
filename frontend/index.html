<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot</title>
  <style>
    :root {
      --sidebar-bg: #1a1d23;
      --sidebar-border: #2e3340;
      --sidebar-text: #c9cdd8;
      --sidebar-muted: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f52d0;
      --chat-bg: #ffffff;
      --header-bg: #f8f9fb;
      --header-border: #e5e7eb;
      --user-bubble: #6366f1;
      --user-text: #ffffff;
      --bot-bubble: #f3f4f6;
      --bot-text: #111827;
      --input-border: #d1d5db;
      --font: system-ui, -apple-system, sans-serif;
      --radius: 12px;
      --sidebar-w: 280px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--sidebar-bg); height: 100dvh; display: flex; overflow: hidden; }
    #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; padding: 20px 16px; gap: 20px; overflow-y: auto; }
    #sidebar h2 { color: #ffffff; font-size: 1rem; font-weight: 600; }
    .section-label { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--sidebar-muted); margin-bottom: 8px; }
    #drop-zone { border: 2px dashed var(--sidebar-border); border-radius: var(--radius); padding: 24px 12px; text-align: center; cursor: pointer; color: var(--sidebar-muted); font-size: .85rem; transition: border-color .2s; }
    #drop-zone:hover { border-color: var(--accent); color: var(--sidebar-text); }
    #file-input { display: none; }
    #upload-btn { width: 100%; padding: 9px 0; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: .875rem; font-weight: 500; cursor: pointer; margin-top: 10px; }
    #upload-btn:hover { background: var(--accent-hover); }
    #upload-btn:disabled { opacity: .5; cursor: not-allowed; }
    #progress-wrap { display: none; height: 6px; background: var(--sidebar-border); border-radius: 99px; overflow: hidden; margin-top: 10px; }
    #progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width .3s; }
    #file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,.04); border-radius: 8px; padding: 8px 10px; font-size: .8rem; color: var(--sidebar-text); gap: 8px; }
    .file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-badge { font-size: .7rem; background: rgba(99,102,241,.25); color: var(--accent); padding: 2px 7px; border-radius: 99px; }
    #chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); overflow: hidden; }
    #chat-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: var(--header-bg); border-bottom: 1px solid var(--header-border); flex-shrink: 0; }
    #chat-header h1 { font-size: 1.05rem; font-weight: 600; color: #111827; }
    #clear-btn { font-size: .8rem; padding: 6px 14px; border: 1px solid var(--input-border); background: #fff; border-radius: 8px; cursor: pointer; color: #374151; }
    #clear-btn:hover { background: #f3f4f6; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
    .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 760px; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.bot { align-self: flex-start; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 700; }
    .user .avatar { background: var(--user-bubble); color: #fff; }
    .bot .avatar { background: #e5e7eb; color: #374151; }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: .9rem; line-height: 1.6; max-width: 600px; word-break: break-word; white-space: pre-wrap; }
    .user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
    .bot .bubble { background: var(--bot-bubble); color: var(--bot-text); border-bottom-left-radius: 4px; }
    .sources-toggle { margin-top: 8px; font-size: .78rem; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .sources-toggle:hover { text-decoration: underline; }
    .sources-list { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }
    .source-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; font-size: .78rem; color: #374151; }
    .source-card .src-file { font-weight: 600; margin-bottom: 2px; }
    .source-card .src-meta { color: var(--sidebar-muted); font-size: .72rem; }
    .source-card .src-preview { margin-top: 4px; color: #6b7280; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    #input-bar { padding: 16px 24px; border-top: 1px solid var(--header-border); background: var(--header-bg); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    #query-input { flex: 1; resize: none; border: 1px solid var(--input-border); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: .9rem; line-height: 1.5; max-height: 140px; outline: none; }
    #query-input:focus { border-color: var(--accent); }
    #send-btn { padding: 10px 18px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: .9rem; font-weight: 500; cursor: pointer; }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: .5; cursor: not-allowed; }
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast { padding: 12px 18px; border-radius: 10px; color: #fff; font-size: .85rem; font-weight: 500; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
<aside id="sidebar">
  <h2>🗂 RAG Chatbot</h2>
  <div>
    <div class="section-label">Upload Documents</div>
    <div id="drop-zone">
      <div>📄 Drop PDF, TXT, or MD here</div>
      <div style="font-size:.75rem;margin-top:4px">or click to browse</div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md,.docx" />
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <button id="upload-btn">Upload & Index</button>
  </div>
  <div>
    <div class="section-label">Indexed Files</div>
    <div id="file-list"><div style="font-size:.8rem;color:var(--sidebar-muted)">No files yet.</div></div>
  </div>
</aside>
<main id="chat-panel">
  <header id="chat-header">
    <h1>💬 RAG Chatbot</h1>
    <button id="clear-btn">Clear chat</button>
  </header>
  <div id="messages">
    <div class="msg-row bot">
      <div class="avatar">🤖</div>
      <div><div class="bubble">Hi! Upload a document using the sidebar, then ask me anything about it.</div></div>
    </div>
  </div>
  <div id="input-bar">
    <textarea id="query-input" rows="1" placeholder="Ask a question… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send-btn">Send</button>
  </div>
</main>
<div id="toast-container"></div>
<script>
const SESSION_KEY = 'rag_session_id';
let sessionId = localStorage.getItem(SESSION_KEY);
if (!sessionId) { sessionId = 'sess_' + Math.random().toString(36).slice(2,11); localStorage.setItem(SESSION_KEY, sessionId); }
const indexedFiles = [];
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const fileList = document.getElementById('file-list');
const messages = document.getElementById('messages');
const queryInput = document.getElementById('query-input');
const sendBtn = document.getElementById('send-btn');
const clearBtn = document.getElementById('clear-btn');

function showToast(msg, type='success') {
  const tc = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  tc.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function renderFileList() {
  if (!indexedFiles.length) { fileList.innerHTML = '<div style="font-size:.8rem;color:var(--sidebar-muted)">No files yet.</div>'; return; }
  fileList.innerHTML = indexedFiles.map(f => `<div class="file-item"><span class="fname">${f.name}</span><span class="file-badge">${f.chunks} chunks</span></div>`).join('');
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = ''; if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); });
uploadBtn.addEventListener('click', () => { if (fileInput.files[0]) uploadFile(fileInput.files[0]); else fileInput.click(); });

async function uploadFile(file) {
  uploadBtn.disabled = true;
  progressWrap.style.display = 'block';
  progressBar.style.width = '10%';
  const fd = new FormData();
  fd.append('file', file);
  try {
    progressBar.style.width = '40%';
    const res = await fetch('/api/ingest', { method: 'POST', body: fd });
    progressBar.style.width = '80%';
    if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || 'Upload failed'); }
    const data = await res.json();
    progressBar.style.width = '100%';
    indexedFiles.push({ name: data.file_name, chunks: data.chunks_indexed });
    renderFileList();
    showToast(`✅ "${data.file_name}" indexed (${data.chunks_indexed} chunks)`);
  } catch(e) { showToast(`❌ ${e.message}`, 'error'); }
  finally { setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600); uploadBtn.disabled = false; fileInput.value = ''; }
}

function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="avatar">You</div><div><div class="bubble">${escHtml(text)}</div></div>`;
  messages.appendChild(row); scrollBottom();
}

function addTypingIndicator() {
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  row.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  messages.appendChild(row); scrollBottom(); return row;
}

function createBotMessageRow() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble" id="active-bubble"></div><div id="active-sources"></div></div>`;
  messages.appendChild(row); scrollBottom(); return row;
}

function renderSources(sources, container) {
  if (!sources || !sources.length) return;
  const toggle = document.createElement('div');
  toggle.className = 'sources-toggle';
  toggle.innerHTML = `<span>▶</span> ${sources.length} source${sources.length>1?'s':''}`;
  const list = document.createElement('div');
  list.className = 'sources-list'; list.style.display = 'none';
  sources.forEach(s => {
    const card = document.createElement('div'); card.className = 'source-card';
    const fname = s.source.split('/').pop() || s.source;
    const pageInfo = s.page != null ? ` · p.${s.page+1}` : '';
    const scoreInfo = s.score ? ` · score ${s.score.toFixed(2)}` : '';
    card.innerHTML = `<div class="src-file">${escHtml(fname)}</div><div class="src-meta">${pageInfo}${scoreInfo}</div><div class="src-preview">${escHtml(s.content)}</div>`;
    list.appendChild(card);
  });
  toggle.addEventListener('click', () => { const open = list.style.display!=='none'; list.style.display=open?'none':'flex'; toggle.querySelector('span').textContent=open?'▶':'▼'; });
  container.appendChild(toggle); container.appendChild(list);
}

async function sendMessage() {
  const query = queryInput.value.trim();
  if (!query) return;
  queryInput.value = ''; queryInput.style.height = 'auto'; sendBtn.disabled = true;
  addUserMessage(query);
  const typingRow = addTypingIndicator();
  try {
    const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({query, session_id: sessionId}) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    typingRow.remove();
    createBotMessageRow();
    const bubble = document.getElementById('active-bubble');
    const sourcesContainer = document.getElementById('active-sources');
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const parts = buffer.split('\n\n'); buffer = parts.pop() || '';
      for (const part of parts) {
        const dataLine = part.split('\n').find(l => l.startsWith('data:'));
        if (!dataLine) continue;
        let payload; try { payload = JSON.parse(dataLine.slice(5).trim()); } catch { continue; }
        if (payload.token) { bubble.textContent += payload.token; scrollBottom(); }
        if (payload.done && !sourcesContainer.dataset.rendered) {
           sourcesContainer.dataset.rendered = 'true';
           renderSources(payload.sources, sourcesContainer);
           scrollBottom();
        }
        if (payload.error) { bubble.textContent += `\n[Error: ${payload.error}]`; }
      }
    }
  } catch(e) {
    typingRow?.remove();
    const row = document.createElement('div'); row.className = 'msg-row bot';
    row.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble" style="color:#ef4444">Error: ${escHtml(e.message)}</div></div>`;
    messages.appendChild(row); scrollBottom();
  } finally { sendBtn.disabled = false; queryInput.focus(); }
}

sendBtn.addEventListener('click', sendMessage);
queryInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
queryInput.addEventListener('input', () => { queryInput.style.height='auto'; queryInput.style.height=Math.min(queryInput.scrollHeight,140)+'px'; });
clearBtn.addEventListener('click', () => {
  messages.innerHTML = `<div class="msg-row bot"><div class="avatar">🤖</div><div><div class="bubble">Chat cleared. Ask me anything about your documents!</div></div></div>`;
  sessionId = 'sess_' + Math.random().toString(36).slice(2,11);
  localStorage.setItem(SESSION_KEY, sessionId);
});
fetch('/api/health').then(r=>r.json()).then(data => {
  if (data.doc_count > 0) { fileList.innerHTML = `<div class="file-item"><span class="fname">Previously indexed</span><span class="file-badge">${data.doc_count} chunks</span></div>`; }
}).catch(()=>{});
</script>
</body>
</html>
